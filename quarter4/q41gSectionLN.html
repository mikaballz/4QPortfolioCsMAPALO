<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List - Q1 1st Graded</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f5f5f5; }
        form { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px #ccc; }
        input, select, button { margin: 5px 0; padding: 8px; width: 100%; }
        .stars { display: flex; gap: 5px; cursor: pointer; }
        .star { font-size: 25px; color: gray; }
        .star.selected { color: gold; }
        .movie-list { margin-top: 20px; }
        .movie-item { background: #fff; padding: 10px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 0 5px #ccc; }
    </style>
</head>
<body>

<h2>Add a Movie</h2>
<form id="movieForm">
    <label>Movie Title:</label>
    <input type="text" id="title" required>

    <label>Genre:</label>
    <select id="genre" required>
        <option value="">Select genre</option>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Drama">Drama</option>
        <option value="Horror">Horror</option>
        <option value="Romance">Romance</option>
    </select>

    <label>Rating:</label>
    <div class="stars" id="starRating">
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
    </div>

    <button type="submit">Add Movie</button>
</form>

<div class="movie-list" id="movieList">
    
</div>

<script src="q41gSectionLN.js"></script>
</body>
</html>
